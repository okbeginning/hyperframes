      }

      #root {
        --block-bg: #0e0e12;
        --block-surface: #1a1a20;
        --block-ink: #f5f5f0;
        --block-muted: #8888a0;
        --block-accent: #f59e0b;
        position: relative;
        width: 1080px;
        height: 1920px;
        overflow: hidden;
        color: var(--block-ink);
        font-family: "Outfit", -apple-system, BlinkMacSystemFont, sans-serif;
        /* Dark, textured grid: a warm accent glow behind the number + a fine rule grid,
           edge-to-edge so the card FILLS the portrait frame (never a letterboxed band). */
        background-color: var(--block-bg);
        background-image:
          radial-gradient(
            1200px 940px at 50% 40%,
            rgba(245, 158, 11, 0.12),
            rgba(245, 158, 11, 0) 62%
          ),
          linear-gradient(rgba(255, 255, 255, 0.038) 1px, transparent 1px),
          linear-gradient(90deg, rgba(255, 255, 255, 0.038) 1px, transparent 1px);
        background-size:
          100% 100%,
          90px 90px,
          90px 90px;
        background-position: center;
      }

      /* Corner vignette so the grid recedes at the edges (texture, not a flat fill). */
      .vignette {
        position: absolute;
        inset: 0;
        z-index: 1;
        pointer-events: none;
        background: radial-gradient(
          128% 92% at 50% 46%,
          rgba(14, 14, 18, 0) 52%,
          rgba(14, 14, 18, 0.86) 100%
        );
      }

      .stage {
        position: absolute;
        inset: 0;
        z-index: 5;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 300px 96px;
      }

      /* TOP — accent kicker (dot + rule): decorative brand marker, anchors the top third. */
      .kicker {
        position: absolute;
        top: 300px;
        left: 96px;
        display: flex;
        align-items: center;
        gap: 22px;
      }
      .kicker .dot {
        width: 22px;
        height: 22px;
        border-radius: 50%;
        background: var(--block-accent);
        box-shadow: 0 0 30px var(--block-accent);
      }
      .kicker .rule {
        width: 220px;
        height: 4px;
        border-radius: 4px;
        background: linear-gradient(90deg, var(--block-accent), rgba(245, 158, 11, 0));
        transform: scaleX(0);
        transform-origin: left center;
      }

      /* MIDDLE — the hero number: prefix + huge count + adjacent unit token. Sizes are `em` off
         the row's `font-size` (default 400px) so ONE JS fit-to-width shrink keeps the whole row
         (prefix + value + unit) inside the frame for any magnitude — never clipped off the edge. */
      .value-row {
        display: flex;
        align-items: baseline;
        justify-content: center;
        gap: 0.065em;
        font-size: 400px;
        line-height: 0.86;
      }
      .prefix {
        font-size: 0.4em;
        font-weight: 700;
        color: var(--block-accent);
        opacity: 0;
      }
      .value {
        font-size: 1em;
        font-weight: 800;
        letter-spacing: -0.03em;
        color: var(--block-ink);
        font-variant-numeric: tabular-nums;
        white-space: nowrap;
        text-shadow: 0 30px 90px rgba(0, 0, 0, 0.55);
      }
      .unit {
        font-size: 0.34em;
        font-weight: 700;
        color: var(--block-accent);
        letter-spacing: -0.01em;
        white-space: nowrap;
        opacity: 0;
      }

      /* Below the number — the meaning label (value → meaning), revealed after the count lands. */
      .label {
        margin-top: 84px;
        max-width: 90%;
        font-family: "JetBrains Mono", ui-monospace, monospace;
        font-size: 46px;
        font-weight: 700;
        letter-spacing: 0.26em;
        text-transform: uppercase;
        text-align: center;
        color: var(--block-muted);
        opacity: 0;
      }

      /* BOTTOM — full-width baseline meter, anchors the bottom third. A faint static rule is
         always drawn; the bright accent fill grows only when a `progress` value is supplied. */
      .meter {
        position: absolute;
        left: 96px;
        right: 96px;
        bottom: 300px;
        height: 12px;
        border-radius: 12px;
        background: rgba(255, 255, 255, 0.08);
        overflow: hidden;
      }
      .meter .fill {
        position: absolute;
        left: 0;
        top: 0;
        bottom: 0;
        border-radius: 12px;
        background: linear-gradient(90deg, var(--block-accent), rgba(245, 158, 11, 0.72));
        box-shadow: 0 0 26px rgba(245, 158, 11, 0.5);
        transform: scaleX(0);
        transform-origin: left center;
      }
      .meter .tick {
        position: absolute;
        left: 0;
        top: -8px;
        width: 6px;
        height: 28px;
        border-radius: 4px;
        background: var(--block-accent);
      }
    </style>

  <body>
    <div
      id="root"
      data-composition-id="stat-card-32a3806f"
      data-root="true"
      data-start="0"
      data-duration="5"
      data-width="1080"
      data-height="1920"
    >
      <div class="vignette"></div>

      <div class="kicker">
        <div class="dot"></div>
        <div id="kickerRule" class="rule"></div>
      </div>

      <div class="stage">
        <div class="value-row">
          <div id="statPrefix" class="prefix"></div>
          <div id="statValue" class="value">0</div>
          <div id="statUnit" class="unit"></div>
        </div>
        <div id="statLabel" class="label">LABEL</div>
      </div>

      <div class="meter">
        <div class="tick"></div>
        <div id="statFill" class="fill"></div>
      </div>
    </div>

    <script>
      window.__timelines = window.__timelines || {};

      // Content slots — the store's `applyBlockContent` rewrites this one object with the
      // caller's validated content (single anchor). Defaults render a coherent standalone card.
      const __CONTENT = {"value":60,"unit":"sekund","prefix":"\u003c ","label":"OD POMYSŁU DO STRONY","progress":0.9};

      const value = Number(__CONTENT.value) || 0;
      const unit = __CONTENT.unit == null ? "" : String(__CONTENT.unit);
      const prefix = __CONTENT.prefix == null ? "" : String(__CONTENT.prefix);
      const label = __CONTENT.label == null ? "" : String(__CONTENT.label);
      const hasProgress = typeof __CONTENT.progress === "number";
      const progress = hasProgress ? Math.max(0, Math.min(1, __CONTENT.progress)) : 0;

      const valueEl = document.querySelector("#statValue");
      const prefixEl = document.querySelector("#statPrefix");
      const unitEl = document.querySelector("#statUnit");
      const labelEl = document.querySelector("#statLabel");
      const fillEl = document.querySelector("#statFill");
      const kickerRule = document.querySelector("#kickerRule");

      // Locale-free thousands grouping (deterministic, no Intl/locale dependence): a normal
      // space every 3 digits → "12 120". Non-integers keep one decimal.
      function groupThousands(n) {
        const neg = n < 0;
        const abs = Math.abs(n);
        const isInt = Number.isInteger(value);
        const s = isInt ? String(Math.round(abs)) : abs.toFixed(1);
        const [intPart, frac] = s.split(".");
        const grouped = intPart.replace(/\B(?=(\d{3})+(?!\d))/g, " ");
        return (neg ? "-" : "") + grouped + (frac ? "," + frac : "");
      }

      const countState = { v: 0 };
      function renderValue() {
        valueEl.textContent = groupThousands(countState.v);
      }
      prefixEl.textContent = prefix;
      unitEl.textContent = unit;
      labelEl.textContent = label;

      // Fit-to-width (dynamic scale): size the row to the FINAL (widest) value, then shrink the
      // row's font-size so prefix + value + unit sit inside the frame with a safe margin. Small
      // numbers keep the full 400px display size; large ones scale down instead of clipping.
      const BASE_FONT = 400;
      const MAX_ROW_W = 1080 - 2 * 84;
      const row = document.querySelector(".value-row");
      valueEl.textContent = groupThousands(value);
      const natural = row.scrollWidth;
      if (natural > MAX_ROW_W) {
        row.style.fontSize = Math.floor((BASE_FONT * MAX_ROW_W) / natural) + "px";
      }
      renderValue();

      const tl = gsap.timeline({ paused: true, defaults: { ease: "power3.out" } });

      // Kicker rule draws in.
      tl.fromTo(kickerRule, { scaleX: 0 }, { scaleX: 1, duration: 0.5, ease: "power4.out" }, 0.1);

      // Hero number rises + counts up (value → the injected target). Prefix/unit fade in with it.
      tl.fromTo(
        ".value-row",
        { y: 40, autoAlpha: 0 },
        { y: 0, autoAlpha: 1, duration: 0.5, ease: "power2.out" },
        0.2
      );
      tl.to(prefixEl, { autoAlpha: 1, duration: 0.4 }, 0.25);
      tl.to(unitEl, { autoAlpha: 1, duration: 0.4 }, 0.55);
      tl.to(
        countState,
        {
          v: value,
          duration: 2.3,
          ease: "power2.out",
          onUpdate: renderValue,
          onComplete: () => {
            countState.v = value;
            renderValue();
          },
        },
        0.35
      );
      // The number lands with a restrained pop (value → weight of meaning).
      tl.to(valueEl, { scale: 1.05, duration: 0.16, ease: "back.out(2.4)" }, 2.65);
      tl.to(valueEl, { scale: 1, duration: 0.24, ease: "power2.out" }, 2.81);

      // Label fades in AFTER the number resolves (the meaning arrives once the value is known).
      tl.fromTo(
        labelEl,
        { y: 22, autoAlpha: 0 },
        { y: 0, autoAlpha: 1, duration: 0.5, ease: "power3.out" },
        2.75
      );

      // Progress meter grows to the injected fraction (only when supplied).
      if (hasProgress) {
        tl.fromTo(
          fillEl,
          { scaleX: 0 },
          { scaleX: progress, duration: 0.9, ease: "power2.out", transformOrigin: "left center" },
          3.05
        );
      }

      window.__timelines["stat-card-32a3806f"] = tl;
    </script>
